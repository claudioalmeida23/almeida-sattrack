<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>Almeida SatTrack</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ffcc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon: #00ffcc; --danger: #ff4444; --panel: rgba(0, 0, 0, 0.9); }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        
        #map { width: 100%; height: 100vh; z-index: 1; filter: invert(100%) hue-rotate(180deg) brightness(95%); }

        /* Interface */
        .ui-overlay { position: absolute; z-index: 1000; width: 94%; left: 3%; pointer-events: none; }
        .ui-element { pointer-events: auto; background: var(--panel); border: 1px solid var(--neon); border-radius: 12px; backdrop-filter: blur(10px); }

        /* Painel de Permissões/Status */
        .status-bar { top: 10px; padding: 12px; display: flex; flex-direction: column; gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .brand-line { display: flex; justify-content: space-between; align-items: center; }
        .brand-name { color: var(--neon); font-weight: bold; font-size: 14px; letter-spacing: 1px; }
        
        .perm-badge { font-size: 10px; padding: 4px 8px; border-radius: 20px; text-transform: uppercase; font-weight: bold; }
        .perm-off { background: rgba(255, 68, 68, 0.2); color: var(--danger); border: 1px solid var(--danger); }
        .perm-on { background: rgba(0, 255, 204, 0.2); color: var(--neon); border: 1px solid var(--neon); }

        select { width: 100%; padding: 12px; background: #111; color: var(--neon); border: 1px solid #333; border-radius: 8px; font-size: 16px; margin-top: 5px; outline: none; }

        /* Card Pro */
        .info-card { bottom: 20px; padding: 15px; display: none; align-items: center; gap: 15px; box-shadow: 0 -4px 20px rgba(0, 255, 204, 0.2); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; flex-grow: 1; }
        .stat-box { border-left: 2px solid #222; padding-left: 8px; }
        .stat-label { color: #666; font-size: 9px; text-transform: uppercase; }
        .stat-value { color: var(--neon); font-size: 15px; font-weight: bold; font-family: monospace; }

        /* Bússola Lateral */
        #compass-ui { width: 70px; height: 70px; border: 2px solid #222; border-radius: 50%; position: relative; flex-shrink: 0; background: rgba(255,255,255,0.02); }
        #ndl-n { width: 2px; height: 30px; background: var(--danger); position: absolute; left: 50%; top: 5px; transform-origin: bottom center; }
        #ndl-s { width: 4px; height: 32px; background: var(--neon); position: absolute; left: 50%; top: 4px; transform-origin: bottom center; display: none; box-shadow: 0 0 10px var(--neon); }

        /* Botão Ação */
        .btn-main {
            position: absolute; right: 15px; bottom: 180px; z-index: 1000;
            width: 55px; height: 55px; border-radius: 50%; background: var(--neon);
            border: none; font-size: 24px; cursor: pointer; box-shadow: 0 0 15px rgba(0,255,204,0.4);
            display: flex; align-items: center; justify-content: center;
        }

        footer { position: absolute; bottom: 5px; width: 100%; text-align: center; color: #444; font-size: 9px; z-index: 1001; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ui-overlay status-bar ui-element">
        <div class="brand-line">
            <span class="brand-name">ALMEIDA SATTRACK</span>
            <div id="gps-status" class="perm-badge perm-off">GPS OFF</div>
        </div>
        <select id="satSelect">
            <option value="">Selecione o Satélite...</option>
        </select>
    </div>

    <button class="btn-main" id="btnAuth" onclick="requestPermissions()">🛰️</button>

    <div class="ui-overlay info-card ui-element" id="card">
        <div class="stats-grid">
            <div class="stat-box"><div class="stat-label">Azimute</div><div class="stat-value" id="val-az">--</div></div>
            <div class="stat-box"><div class="stat-label">Elevação</div><div class="stat-value" id="val-el">--</div></div>
            <div class="stat-box"><div class="stat-label">LNB Skew</div><div class="stat-value" id="val-sk">--</div></div>
            <div class="stat-box"><div class="stat-label">Relógio LNB</div><div class="stat-value" id="val-lnb-h">--</div></div>
        </div>
        <div id="compass-ui">
            <div id="ndl-n"></div>
            <div id="ndl-s"></div>
        </div>
    </div>

    <footer>Claudio Almeida.CAAS</footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let lat, lon, satLon = null;
    let currentHeading = 0;
    let smoothedHeading = 0;
    const filterAlpha = 0.15; // Suavização da bússola (menor = mais estável)
    
    let map, userMarker, satLine, audioCtx;

    // Inicialização do Mapa
    map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-15, -50], 4);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const satellites = [
    // --- AMÉRICAS (WEST) ---
    { "nome": "Tupac Katari 1 (-87.2W)", "pos": -87.2 },
    { "nome": "Galaxy 28 (-89W)", "pos": -89 },
    { "nome": "Galaxy 19 (-97W)", "pos": -97 },
    { "nome": "Anik F3 (-118.7W)", "pos": -118.7 },
    { "nome": "Hispasat 74W", "pos": -74 },
    { "nome": "StarOne C3 (-75W)", "pos": -75 },
    { "nome": "StarOne C2/D2 (-70W)", "pos": -70 },
    { "nome": "SES 10 (-67W)", "pos": -67 },
    { "nome": "Eutelsat 65W", "pos": -65 },
    { "nome": "Telstar 14R (-63W)", "pos": -63 },
    { "nome": "Amazonas 2/3/5 (-61W)", "pos": -61 },
    { "nome": "Intelsat 21 (-58W)", "pos": -58 },
    { "nome": "Intelsat 14 (-45W)", "pos": -45 },
    { "nome": "Sky Brasil-1 (-43.1W)", "pos": -43.1 },
    { "nome": "SES 6 (-40.5W)", "pos": -40.5 },
    { "nome": "Intelsat 35 (-34.5W)", "pos": -34.5 },
    { "nome": "Hispasat 30W", "pos": -30 },
    { "nome": "SES 4 (-22W)", "pos": -22 },

    // --- EUROPA / ÁFRICA / ORIENTE MÉDIO ---
    { "nome": "Eutelsat 8 West B (-8W)", "pos": -8 },
    { "nome": "Amos 3/7 (-4W)", "pos": -4 },
    { "nome": "Thor 5/6 (0.8W)", "pos": -0.8 },
    { "nome": "Astra 4A (4.8E)", "pos": 4.8 },
    { "nome": "Eutelsat 7C (7E)", "pos": 7 },
    { "nome": "Eutelsat 9B (9E)", "pos": 9 },
    { "nome": "Hotbird 13E", "pos": 13 },
    { "nome": "Eutelsat 16A (16E)", "pos": 16 },
    { "nome": "Astra 19.2E", "pos": 19.2 },
    { "nome": "Eutelsat 21B (21.5E)", "pos": 21.5 },
    { "nome": "Astra 2E/2F/2G (28.2E)", "pos": 28.2 },
    { "nome": "Arabsat 5A/6A (30.5E)", "pos": 30.5 },
    { "nome": "Eutelsat 36B/36C (36E)", "pos": 36 },
    { "nome": "Hellas Sat 3/4 (39E)", "pos": 39 },
    { "nome": "Turksat 42E", "pos": 42 },
    { "nome": "AzerSpace 1 (46E)", "pos": 46 },

    // --- ÁSIA / OCEANIA (EAST) ---
    { "nome": "NSS-12 (57E)", "pos": 57 },
    { "nome": "Intelsat 20 (68.5E)", "pos": 68.5 },
    { "nome": "Apstar 7 (76.5E)", "pos": 76.5 },
    { "nome": "Thaicom 6/8 (78.5E)", "pos": 78.5 },
    { "nome": "ST 2 (88E)", "pos": 88 },
    { "nome": "Asiasat 7 (105.5E)", "pos": 105.5 },
    { "nome": "Telkom 4 (108E)", "pos": 108 },
    { "nome": "Chinasat 11 (98E)", "pos": 98 },
    { "nome": "Vinasat 1/2 (132E)", "pos": 132 },
    { "nome": "Apstar 6C/6D (134E)", "pos": 134 }
];

    const select = document.getElementById("satSelect");
    satellites.sort((a,b) => a.pos - b.pos).forEach(s => select.add(new Option(s.nome, s.pos)));

    // Registro de Service Worker para PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => console.log("SW Erro:", err));
    }

    async function requestPermissions() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(updateGPS, handleGPSError, { enableHighAccuracy: true });
        }

        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            try {
                const response = await DeviceOrientationEvent.requestPermission();
                if (response === 'granted') startCompass();
            } catch (e) { alert("Acesso aos sensores negado."); }
        } else {
            startCompass();
        }
        
        document.getElementById("btnAuth").style.display = "none";
    }

    function updateGPS(pos) {
        lat = pos.coords.latitude;
        lon = pos.coords.longitude;
        const status = document.getElementById("gps-status");
        status.innerText = "GPS ON";
        status.className = "perm-badge perm-on";
        
        if (!userMarker) {
            userMarker = L.circleMarker([lat, lon], { color: '#00ffcc', radius: 7, fillOpacity: 1 }).addTo(map);
            map.flyTo([lat, lon], 18);
        } else {
            userMarker.setLatLng([lat, lon]);
        }
        atualizarCalculos();
    }

    function handleGPSError() { alert("Por favor, ative o GPS."); }

    function startCompass() {
        window.addEventListener("deviceorientationabsolute", (e) => {
            if (e.alpha !== null) {
                let rawHeading = 360 - e.alpha;
                
                // Evita o salto brusco entre 0 e 360 graus no filtro
                if (Math.abs(rawHeading - smoothedHeading) > 180) {
                    if (rawHeading > smoothedHeading) smoothedHeading += 360;
                    else smoothedHeading -= 360;
                }
                
                // Aplicação do Filtro de Suavização
                smoothedHeading = smoothedHeading + filterAlpha * (rawHeading - smoothedHeading);
                currentHeading = (smoothedHeading + 360) % 360;

                document.getElementById("ndl-n").style.transform = `translateX(-50%) rotate(${currentHeading}deg)`;
                atualizarCalculos();
            }
        }, true);
    }

    select.onchange = () => {
        satLon = parseFloat(select.value);
        if(!isNaN(satLon)) {
            document.getElementById("card").style.display = "flex";
            atualizarCalculos();
        }
    };

    function atualizarCalculos() {
        if (lat === undefined || satLon === null) return;

        const az = calcAz(lat, lon, satLon);
        const el = calcEl(lat, lon, satLon);
        const sk = calcSk(lat, lon, satLon);
        
        let lnbH = Math.round(7 + (sk / 30));
        if (lnbH > 12) lnbH -= 12;

        document.getElementById("val-az").innerText = az.toFixed(1) + "°";
        document.getElementById("val-el").innerText = el.toFixed(1) + "°";
        document.getElementById("val-sk").innerText = sk.toFixed(1) + "°";
        document.getElementById("val-lnb-h").innerText = `~${lnbH}h`;

        const sNeedle = document.getElementById("ndl-s");
        sNeedle.style.display = "block";
        const totalRot = (az + currentHeading) % 360;
        sNeedle.style.transform = `translateX(-50%) rotate(${totalRot}deg)`;

        // Som de proximidade (Beep)
        let diff = Math.abs(totalRot % 360);
        if (diff > 180) diff = 360 - diff;
        if (diff < 10 && Math.random() > (diff/10)) playBeep();

        drawVisualPath(lat, lon, az);
    }

    function playBeep() {
        if (!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gn = audioCtx.createGain();
        osc.connect(gn); gn.connect(audioCtx.destination);
        osc.frequency.value = 1000; gn.gain.value = 0.05;
        osc.start(); osc.stop(audioCtx.currentTime + 0.04);
    }

    function drawVisualPath(uLat, uLon, az) {
        if (satLine) map.removeLayer(satLine);
        const brng = az * Math.PI / 180;
        const d = 0.25; const R = 6371;
        const rLat = uLat * Math.PI / 180; const rLon = uLon * Math.PI / 180;
        let nLat = Math.asin(Math.sin(rLat)*Math.cos(d/R) + Math.cos(rLat)*Math.sin(d/R)*Math.cos(brng));
        let nLon = rLon + Math.atan2(Math.sin(brng)*Math.sin(d/R)*Math.cos(rLat), Math.cos(d/R)-Math.sin(rLat)*Math.sin(nLat));
        satLine = L.polyline([[uLat, uLon], [nLat * 180/Math.PI, nLon * 180/Math.PI]], {
            color: '#00ffcc', weight: 4, dashArray: '10, 15', opacity: 0.7
        }).addTo(map);
    }

    function calcAz(la, lo, sl) {
        let dl = (sl - lo) * Math.PI / 180;
        let rl = la * Math.PI / 180;
        return (Math.atan2(Math.sin(dl), -Math.tan(rl) * Math.cos(dl)) * 180 / Math.PI + 360) % 360;
    }
    function calcEl(la, lo, sl) {
        let dl = (sl - lo) * Math.PI / 180;
        let rl = la * Math.PI / 180;
        let cC = Math.cos(rl) * Math.cos(dl);
        return Math.atan((cC - 0.1512) / Math.sqrt(1 - cC * cC)) * 180 / Math.PI;
    }
    function calcSk(la, lo, sl) {
        let dl = (sl - lo) * Math.PI / 180;
        let rl = la * Math.PI / 180;
        return Math.atan(Math.sin(dl) / Math.tan(rl)) * 180 / Math.PI;
    }
</script>
</body>
</html>
