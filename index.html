<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>Almeida SatTrack</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        /* Mapa Dark Mode de alta economia de energia */
        #map { 
            width: 100%; height: 100vh; z-index: 1; background: #000;
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }

        /* Interface do Usuário */
        .ui-overlay { position: absolute; z-index: 1000; width: 92%; left: 4%; pointer-events: none; }
        .ui-element { pointer-events: auto; background: rgba(0, 0, 0, 0.9); border: 1px solid #00ffcc; border-radius: 12px; backdrop-filter: blur(8px); }

        .top-panel { top: 15px; padding: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .brand-title { color: #00ffcc; font-size: 14px; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; text-align: center; }
        
        select { 
            width: 100%; padding: 12px; background: #111; color: #00ffcc; 
            border: 1px solid #333; border-radius: 6px; font-size: 16px; outline: none; 
        }

        /* Card de Dados Técnicos */
        .info-card { 
            bottom: 30px; padding: 15px; display: none;
            grid-template-columns: 1fr auto; gap: 12px;
            box-shadow: 0 -4px 20px rgba(0, 255, 204, 0.2);
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-item { color: #555; font-size: 9px; text-transform: uppercase; font-weight: bold; }
        .stat-value { color: #00ffcc; font-size: 16px; font-weight: bold; font-family: 'Courier New', monospace; }

        /* Bússola HUD */
        #mini-compass {
            width: 75px; height: 75px; border: 2px solid #222; border-radius: 50%;
            position: relative; align-self: center; background: rgba(0, 255, 204, 0.02);
        }
        #ndl-n { width: 2px; height: 32px; background: #ff4444; position: absolute; left: 50%; top: 5px; transform-origin: bottom center; }
        #ndl-s { width: 4px; height: 32px; background: #00ffcc; position: absolute; left: 50%; top: 5px; transform-origin: bottom center; display: none; box-shadow: 0 0 8px #00ffcc; }

        .btn-gps {
            position: absolute; right: 20px; bottom: 220px; z-index: 1000;
            width: 55px; height: 55px; border-radius: 50%; background: #00ffcc;
            border: none; font-size: 24px; cursor: pointer; box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
            display: flex; align-items: center; justify-content: center;
        }

        footer { position: absolute; bottom: 6px; width: 100%; text-align: center; color: rgba(255,255,255,0.2); font-size: 10px; z-index: 1001; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ui-overlay top-panel ui-element">
        <div class="brand-title">Almeida SatTrack</div>
        <select id="satSelect">
            <option value="">Selecione o Satélite...</option>
        </select>
    </div>

    <button class="btn-gps" onclick="startGPS()">📍</button>

    <div class="ui-overlay info-card ui-element" id="card">
        <div class="stats-grid">
            <div>
                <div class="stat-item">Azimute</div>
                <div class="stat-value" id="val-az">--</div>
            </div>
            <div>
                <div class="stat-item">Elevação</div>
                <div class="stat-value" id="val-el">--</div>
            </div>
            <div>
                <div class="stat-item">LNB Skew</div>
                <div class="stat-value" id="val-sk">--</div>
            </div>
            <div>
                <div class="stat-item">Orbital</div>
                <div class="stat-value" id="val-pos">--</div>
            </div>
        </div>
        <div id="mini-compass">
            <div id="ndl-n"></div>
            <div id="ndl-s"></div>
        </div>
    </div>

    <footer>Claudio Almeida.CAAS</footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let lat, lon, satLon = null, currentHeading = 0;
    let map, userMarker, satLine;

    // Inicialização do Mapa
    map = L.map('map', { zoomControl: false }).setView([-15, -50], 4);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

    // Lista Global Organizada
   const satellites = [
    // --- AMÉRICAS (WEST) ---
    { "nome": "Tupac Katari 1 (-87.2W)", "pos": -87.2 },
    { "nome": "Galaxy 28 (-89W)", "pos": -89 },
    { "nome": "Galaxy 19 (-97W)", "pos": -97 },
    { "nome": "Anik F3 (-118.7W)", "pos": -118.7 },
    { "nome": "Hispasat 74W", "pos": -74 },
    { "nome": "StarOne C3 (-75W)", "pos": -75 },
    { "nome": "StarOne C2/D2 (-70W)", "pos": -70 },
    { "nome": "SES 10 (-67W)", "pos": -67 },
    { "nome": "Eutelsat 65W", "pos": -65 },
    { "nome": "Telstar 14R (-63W)", "pos": -63 },
    { "nome": "Amazonas 2/3/5 (-61W)", "pos": -61 },
    { "nome": "Intelsat 21 (-58W)", "pos": -58 },
    { "nome": "Intelsat 14 (-45W)", "pos": -45 },
    { "nome": "Sky Brasil-1 (-43.1W)", "pos": -43.1 },
    { "nome": "SES 6 (-40.5W)", "pos": -40.5 },
    { "nome": "Intelsat 35 (-34.5W)", "pos": -34.5 },
    { "nome": "Hispasat 30W", "pos": -30 },
    { "nome": "SES 4 (-22W)", "pos": -22 },

    // --- EUROPA / ÁFRICA / ORIENTE MÉDIO ---
    { "nome": "Eutelsat 8 West B (-8W)", "pos": -8 },
    { "nome": "Amos 3/7 (-4W)", "pos": -4 },
    { "nome": "Thor 5/6 (0.8W)", "pos": -0.8 },
    { "nome": "Astra 4A (4.8E)", "pos": 4.8 },
    { "nome": "Eutelsat 7C (7E)", "pos": 7 },
    { "nome": "Eutelsat 9B (9E)", "pos": 9 },
    { "nome": "Hotbird 13E", "pos": 13 },
    { "nome": "Eutelsat 16A (16E)", "pos": 16 },
    { "nome": "Astra 19.2E", "pos": 19.2 },
    { "nome": "Eutelsat 21B (21.5E)", "pos": 21.5 },
    { "nome": "Astra 2E/2F/2G (28.2E)", "pos": 28.2 },
    { "nome": "Arabsat 5A/6A (30.5E)", "pos": 30.5 },
    { "nome": "Eutelsat 36B/36C (36E)", "pos": 36 },
    { "nome": "Hellas Sat 3/4 (39E)", "pos": 39 },
    { "nome": "Turksat 42E", "pos": 42 },
    { "nome": "AzerSpace 1 (46E)", "pos": 46 },

    // --- ÁSIA / OCEANIA (EAST) ---
    { "nome": "NSS-12 (57E)", "pos": 57 },
    { "nome": "Intelsat 20 (68.5E)", "pos": 68.5 },
    { "nome": "Apstar 7 (76.5E)", "pos": 76.5 },
    { "nome": "Thaicom 6/8 (78.5E)", "pos": 78.5 },
    { "nome": "ST 2 (88E)", "pos": 88 },
    { "nome": "Asiasat 7 (105.5E)", "pos": 105.5 },
    { "nome": "Telkom 4 (108E)", "pos": 108 },
    { "nome": "Chinasat 11 (98E)", "pos": 98 },
    { "nome": "Vinasat 1/2 (132E)", "pos": 132 },
    { "nome": "Apstar 6C/6D (134E)", "pos": 134 }
];

    const select = document.getElementById("satSelect");
    satellites.sort((a,b) => a.pos - b.pos).forEach(sat => {
        let opt = document.createElement("option");
        opt.value = sat.pos;
        opt.text = sat.nome;
        select.appendChild(opt);
    });

    select.onchange = () => {
        satLon = parseFloat(select.value);
        if(!isNaN(satLon)) {
            document.getElementById("card").style.display = "grid";
            atualizarTudo();
        }
    };

    function startGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                lat = pos.coords.latitude;
                lon = pos.coords.longitude;
                map.flyTo([lat, lon], 19);
                if (userMarker) userMarker.setLatLng([lat, lon]);
                else userMarker = L.circleMarker([lat, lon], { color: '#00ffcc', radius: 6, fillOpacity: 1 }).addTo(map);
                atualizarTudo();
            }, (err) => alert("Erro GPS: " + err.message), { enableHighAccuracy: true });
        }
    }

    // Listener para bússola do dispositivo
    window.addEventListener("deviceorientationabsolute", (e) => {
        if (e.alpha !== null) {
            currentHeading = e.alpha;
            document.getElementById("ndl-n").style.transform = `translateX(-50%) rotate(${-currentHeading}deg)`;
            atualizarTudo();
        }
    }, true);

    function atualizarTudo() {
        if (lat === undefined || satLon === null) return;

        const az = calcularAzimute(lat, lon, satLon);
        const el = calcularElevacao(lat, lon, satLon);
        const sk = calcularSkew(lat, lon, satLon);

        // UI Update
        document.getElementById("val-az").innerText = az.toFixed(1) + "°";
        document.getElementById("val-el").innerText = el.toFixed(1) + "°";
        document.getElementById("val-sk").innerText = sk.toFixed(1) + "°";
        document.getElementById("val-pos").innerText = satLon + "°";

        // Bússola HUD
        const sNeedle = document.getElementById("ndl-s");
        sNeedle.style.display = "block";
        sNeedle.style.transform = `translateX(-50%) rotate(${az - currentHeading}deg)`;

        // Linha Visual no Mapa
        desenharLinha(lat, lon, az);
    }

    function calcularSkew(lat, lon, satLon) {
        let dLon = (satLon - lon) * Math.PI / 180;
        let rLat = lat * Math.PI / 180;
        return (Math.atan(Math.sin(dLon) / Math.tan(rLat))) * 180 / Math.PI;
    }

    function desenharLinha(uLat, uLon, az) {
        if (satLine) map.removeLayer(satLine);
        const d = 0.25; const R = 6371; const brng = az * Math.PI / 180;
        const rLat = uLat * Math.PI / 180; const rLon = uLon * Math.PI / 180;
        let dLat = Math.asin(Math.sin(rLat)*Math.cos(d/R) + Math.cos(rLat)*Math.sin(d/R)*Math.cos(brng));
        let dLon = rLon + Math.atan2(Math.sin(brng)*Math.sin(d/R)*Math.cos(rLat), Math.cos(d/R)-Math.sin(rLat)*Math.sin(dLat));
        satLine = L.polyline([[uLat, uLon], [dLat * 180/Math.PI, dLon * 180/Math.PI]], {
            color: '#00ffcc', weight: 3, opacity: 0.8, dashArray: '5, 10'
        }).addTo(map);
    }

    function calcularAzimute(lat, lon, satLon) {
        let dlon = (satLon - lon) * Math.PI / 180;
        let rLat = lat * Math.PI / 180;
        let az = Math.atan2(Math.sin(dlon), -Math.tan(rLat) * Math.cos(dlon));
        return (az * 180 / Math.PI + 360) % 360;
    }

    function calcularElevacao(lat, lon, satLon) {
        let dlon = (satLon - lon) * Math.PI / 180;
        let rLat = lat * Math.PI / 180;
        let cosC = Math.cos(rLat) * Math.cos(dlon);
        let el = Math.atan((cosC - 0.1512) / Math.sqrt(1 - cosC * cosC));
        return el * 180 / Math.PI;
    }
</script>
</body>
</html>
